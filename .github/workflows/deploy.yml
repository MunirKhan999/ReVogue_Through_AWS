name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy-backend:
    name: Deploy API to EC2
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::687098277128:role/revogue-github-actions
          aws-region: us-east-1

      - name: Write env file to SSM Parameter Store
        run: |
          aws ssm put-parameter \
            --name "/revogue/production/env" \
            --type "SecureString" \
            --overwrite \
            --value "
          NODE_ENV=production
          PORT=3001
          DB_HOST=revogue-postgres.c07s4icweide.us-east-1.rds.amazonaws.com
          DB_PORT=5432
          DB_USERNAME=revogue_admin
          DB_PASSWORD=<from-terraform.tfvars>
          DB_NAME=revogue
          DB_SSL=true
          DB_SYNCHRONIZE=false
          COGNITO_USER_POOL_ID=us-east-1_NogZEV71B
          COGNITO_CLIENT_ID=2jrsmqbd94m9l944qrij2084q9
          FRONTEND_URL=https://d2piuiryjaendq.cloudfront.net
          API_GATEWAY_URL=https://e9fpi2tcsa.execute-api.us-east-1.amazonaws.com/prod
          " \
            --region us-east-1

      - name: Get EC2 Instance ID
        id: get-instance
        run: |
          INSTANCE_ID="i-019879fdbf90b0f17"
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "Found EC2 instance: $INSTANCE_ID"

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.get-instance.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "sudo su - ec2-user -c \"cd /home/ec2-user/app && git pull origin main && cd Backend/revogue-backend && npm ci && npm run build && pm2 restart revogue-backend || pm2 start dist/main.js --name revogue-backend\""
            ]' \
            --region us-east-1 \
            --output text \
            --query "Command.CommandId")
          echo "$COMMAND_ID" > /tmp/command-id.txt
          echo "SSM Command ID: $COMMAND_ID"

      - name: Wait for deployment
        run: |
          COMMAND_ID=$(cat /tmp/command-id.txt)
          INSTANCE_ID="${{ steps.get-instance.outputs.instance_id }}"
          
          echo "Waiting for SSM command to complete..."
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --region us-east-1 \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")
            
            echo "Attempt $i/60 - Status: $STATUS"
            
            if [ "$STATUS" = "Success" ]; then
              echo "✅ Deployment succeeded!"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "❌ Deployment failed with status: $STATUS"
              exit 1
            fi
            
            sleep 10
          done
          
          echo "❌ Timed out waiting for deployment (10 minutes)"
          exit 1

      - name: Check result
        run: |
          aws ssm get-command-invocation \
            --command-id "$(cat /tmp/command-id.txt)" \
            --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
            --region us-east-1 \
            --query "[StatusDetails, StandardOutputContent, StandardErrorContent]" \
            --output text

  deploy-frontend:
    name: Deploy frontend to S3 / CloudFront
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: Frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Write production env for build
        run: |
          cat > revogue-frontend/.env.production << EOF
          NEXT_PUBLIC_API_URL=https://e9fpi2tcsa.execute-api.us-east-1.amazonaws.com/prod
          NEXT_PUBLIC_COGNITO_USER_POOL_ID=us-east-1_NogZEV71B
          NEXT_PUBLIC_COGNITO_CLIENT_ID=2jrsmqbd94m9l944qrij2084q9
          EOF

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::687098277128:role/revogue-github-actions
          aws-region: us-east-1

      - name: Build and deploy
        env:
          FRONTEND_S3_BUCKET: revogue-frontend-687098277128
          FRONTEND_CLOUDFRONT_DISTRIBUTION_ID: E26RRIVPQVNL7H
        run: npm ci && npm run deploy
