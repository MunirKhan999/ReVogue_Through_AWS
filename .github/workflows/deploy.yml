name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy-backend:
    name: Deploy API to EC2
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: Backend/revogue-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Backend/revogue-backend/package-lock.json

      - name: Write production env file
        working-directory: Backend
        run: |
          cat > .env.production << EOF
          NODE_ENV=production
          PORT=3001
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=5432
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_SSL=true
          DB_SYNCHRONIZE=false
          COGNITO_USER_POOL_ID=${{ secrets.COGNITO_USER_POOL_ID }}
          COGNITO_CLIENT_ID=${{ secrets.COGNITO_CLIENT_ID }}
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          API_GATEWAY_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          EOF

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install SSM plugin
        run: |
          curl "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" \
            -o "session-manager-plugin.deb"
          sudo dpkg -i session-manager-plugin.deb

      - name: Get EC2 Instance ID
        id: get-instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=${{ secrets.EC2_NAME_TAG }}" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text \
            --region ${{ secrets.AWS_REGION }})
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "Found instance: $INSTANCE_ID"

      - name: Deploy via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ steps.get-instance.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "cd /home/ec2-user/app || cd /opt/app",
              "git pull origin main",
              "npm ci --prefix revogue-backend",
              "npm run build --prefix revogue-backend",
              "pm2 restart revogue-backend || pm2 start revogue-backend/dist/main.js --name revogue-backend"
            ]' \
            --region ${{ secrets.AWS_REGION }} \
            --output text \
            --query "Command.CommandId" > /tmp/command-id.txt

      - name: Wait for deployment to complete
        run: |
          COMMAND_ID=$(cat /tmp/command-id.txt)
          INSTANCE_ID="${{ steps.get-instance.outputs.instance_id }}"
          
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region ${{ secrets.AWS_REGION }}

      - name: Check deployment result
        run: |
          COMMAND_ID=$(cat /tmp/command-id.txt)
          INSTANCE_ID="${{ steps.get-instance.outputs.instance_id }}"
          
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region ${{ secrets.AWS_REGION }} \
            --query "[StatusDetails, StandardOutputContent, StandardErrorContent]" \
            --output text

  deploy-frontend:
    name: Deploy frontend to S3 / CloudFront
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: Frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Write production env for build
        run: |
          cat > revogue-frontend/.env.production << EOF
          NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_COGNITO_USER_POOL_ID=${{ secrets.NEXT_PUBLIC_COGNITO_USER_POOL_ID }}
          NEXT_PUBLIC_COGNITO_CLIENT_ID=${{ secrets.NEXT_PUBLIC_COGNITO_CLIENT_ID }}
          EOF

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build and deploy
        env:
          FRONTEND_S3_BUCKET: ${{ secrets.FRONTEND_S3_BUCKET }}
          FRONTEND_CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.FRONTEND_CLOUDFRONT_DISTRIBUTION_ID }}
        run: npm ci && npm run deploy
