name: Build & Deploy Gateway Service

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
    paths:
      - 'Backend/services/gateway/**'
      - '.github/workflows/deploy-gateway.yml'

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: 687098277128
  ECR_REPOSITORY: revogue-gateway
  ECS_CLUSTER: revogue-cluster
  ECS_SERVICE: revogue-gateway

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
            docker login --username AWS --password-stdin ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
      
      - name: Debug - List files
        run: |
          echo "Current working directory: $(pwd)"
          ls -R Backend/services || echo "Directory Backend/services not found"

      - name: Build Docker image
        working-directory: E:\Coding\revogue\Backend\services\gateway
        run: |
          docker build -t ${{ env.ECR_REPOSITORY }}:latest .
      
      - name: Tag image for ECR
        run: |
          docker tag ${{ env.ECR_REPOSITORY }}:latest \
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest
      
      - name: Push to ECR
        run: |
          docker push ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest
      
      - name: Force ECS service deployment
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}
      
      - name: Wait for ECS service steady state
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ secrets.AWS_REGION }}
      
      - name: Verify deployment health
        run: |
          aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ secrets.AWS_REGION }} \
            --query 'services[0].[runningCount,desiredCount,deployments[0].rolloutStateReason]' \
            --output table
